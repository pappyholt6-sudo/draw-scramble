<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WCA Cube Top Face Viewer</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #f5f7fb;
      --muted: #9aa4b2;
      --accent: #4f8cff;
      --border: #2a3140;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, Arial, sans-serif;
      padding: 24px;
    }

    .card {
      width: min(980px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 3vw, 2rem);
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .controls {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      align-items: start;
    }

    @media (max-width: 700px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }

    .panel, textarea, select, button {
      font: inherit;
    }

    select, textarea {
      width: 100%;
      background: #0d1016;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.4;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: 0;
      background: var(--accent);
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      filter: brightness(1.08);
    }

    .status {
      margin-top: 14px;
      padding: 14px 16px;
      background: #0d1016;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      min-height: 52px;
      display: flex;
      align-items: center;
    }

    .viewer-wrap {
      margin-top: 18px;
      display: flex;
      gap: 18px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .viewer {
      display: grid;
      gap: 3px;
      padding: 8px;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      width: max-content;
    }

    .sticker {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.2);
    }

    .meta {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 460px;
    }

    code {
      background: #0d1016;
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>WCA Cube Top Face Viewer</h1>
    <p>Paste a scramble for any WCA cube event from 2x2 through 7x7, then view the top face after the scramble.</p>

    <div class="controls">
      <select id="sizeSelect">
        <option value="2">2x2</option>
        <option value="3" selected>3x3</option>
        <option value="4">4x4</option>
        <option value="5">5x5</option>
        <option value="6">6x6</option>
        <option value="7">7x7</option>
      </select>

      <textarea id="scrambleInput" placeholder="Paste scramble here...">R U R' U' F2 D R2 Uw Rw' F</textarea>
    </div>

    <div class="row">
      <button id="applyBtn">Apply Scramble</button>
      <button id="exampleBtn">Load Example</button>
      <button id="clearBtn">Clear</button>
    </div>

    <div class="status" id="status">Ready.</div>

    <div class="viewer-wrap">
      <div id="viewer" class="viewer"></div>
      <div class="meta">
        Supported notation:
        <div><code>U D R L F B</code>, <code>'</code>, <code>2</code></div>
        <div><code>Rw Uw Fw</code>, <code>3Rw 2Uw</code>, lowercase wide aliases like <code>r u f</code></div>
        <div style="margin-top:10px;">Shows the top face only.</div>
      </div>
    </div>
  </main>

  <script>
    const FACE_COLORS = {
      U: "#ffffff",
      D: "#ffd500",
      F: "#00a651",
      B: "#0051ba",
      R: "#c41e3a",
      L: "#ff5800"
    };

    const sizeSelect = document.getElementById("sizeSelect");
    const scrambleInput = document.getElementById("scrambleInput");
    const statusEl = document.getElementById("status");
    const viewerEl = document.getElementById("viewer");

    function makeFace(size, color) {
      return Array.from({ length: size }, () => Array(size).fill(color));
    }

    function makeCube(size) {
      return {
        U: makeFace(size, "U"),
        D: makeFace(size, "D"),
        F: makeFace(size, "F"),
        B: makeFace(size, "B"),
        R: makeFace(size, "R"),
        L: makeFace(size, "L")
      };
    }

    function cloneFace(face) {
      return face.map(row => row.slice());
    }

    function rotateFaceCW(face) {
      const n = face.length;
      const out = Array.from({ length: n }, () => Array(n));
      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          out[c][n - 1 - r] = face[r][c];
        }
      }
      return out;
    }

    function getRow(face, r) {
      return face[r].slice();
    }

    function setRow(face, r, vals) {
      face[r] = vals.slice();
    }

    function getCol(face, c) {
      return face.map(row => row[c]);
    }

    function setCol(face, c, vals) {
      for (let i = 0; i < face.length; i++) face[i][c] = vals[i];
    }

    function rev(arr) {
      return arr.slice().reverse();
    }

    function turnU(cube, layers = 1) {
      const n = cube.U.length;
      for (let layer = 0; layer < layers; layer++) {
        if (layer === 0) cube.U = rotateFaceCW(cube.U);

        const f = getRow(cube.F, layer);
        const r = getRow(cube.R, layer);
        const b = getRow(cube.B, layer);
        const l = getRow(cube.L, layer);

        setRow(cube.R, layer, f);
        setRow(cube.B, layer, r);
        setRow(cube.L, layer, b);
        setRow(cube.F, layer, l);
      }
    }

    function turnD(cube, layers = 1) {
      const n = cube.D.length;
      for (let layer = 0; layer < layers; layer++) {
        const row = n - 1 - layer;
        if (layer === 0) cube.D = rotateFaceCW(cube.D);

        const f = getRow(cube.F, row);
        const l = getRow(cube.L, row);
        const b = getRow(cube.B, row);
        const r = getRow(cube.R, row);

        setRow(cube.L, row, f);
        setRow(cube.B, row, l);
        setRow(cube.R, row, b);
        setRow(cube.F, row, r);
      }
    }

    function turnR(cube, layers = 1) {
      const n = cube.R.length;
      for (let layer = 0; layer < layers; layer++) {
        const col = n - 1 - layer;
        if (layer === 0) cube.R = rotateFaceCW(cube.R);

        const u = getCol(cube.U, col);
        const f = getCol(cube.F, col);
        const d = getCol(cube.D, col);
        const b = getCol(cube.B, layer);

        setCol(cube.F, col, u);
        setCol(cube.D, col, f);
        setCol(cube.B, layer, rev(d));
        setCol(cube.U, col, rev(b));
      }
    }

    function turnL(cube, layers = 1) {
      const n = cube.L.length;
      for (let layer = 0; layer < layers; layer++) {
        const col = layer;
        if (layer === 0) cube.L = rotateFaceCW(cube.L);

        const u = getCol(cube.U, col);
        const b = getCol(cube.B, n - 1 - layer);
        const d = getCol(cube.D, col);
        const f = getCol(cube.F, col);

        setCol(cube.B, n - 1 - layer, rev(u));
        setCol(cube.D, col, rev(b));
        setCol(cube.F, col, d);
        setCol(cube.U, col, f);
      }
    }

    function turnF(cube, layers = 1) {
      const n = cube.F.length;
      for (let layer = 0; layer < layers; layer++) {
        const topRow = n - 1 - layer;
        const rightCol = layer;
        const bottomRow = layer;
        const leftCol = n - 1 - layer;

        if (layer === 0) cube.F = rotateFaceCW(cube.F);

        const u = getRow(cube.U, topRow);
        const r = getCol(cube.R, rightCol);
        const d = getRow(cube.D, bottomRow);
        const l = getCol(cube.L, leftCol);

        setCol(cube.R, rightCol, rev(u));
        setRow(cube.D, bottomRow, r);
        setCol(cube.L, leftCol, rev(d));
        setRow(cube.U, topRow, l);
      }
    }

    function turnB(cube, layers = 1) {
      const n = cube.B.length;
      for (let layer = 0; layer < layers; layer++) {
        const topRow = layer;
        const rightCol = n - 1 - layer;
        const bottomRow = n - 1 - layer;
        const leftCol = layer;

        if (layer === 0) cube.B = rotateFaceCW(cube.B);

        const u = getRow(cube.U, topRow);
        const l = getCol(cube.L, leftCol);
        const d = getRow(cube.D, bottomRow);
        const r = getCol(cube.R, rightCol);

        setCol(cube.L, leftCol, u);
        setRow(cube.D, bottomRow, rev(l));
        setCol(cube.R, rightCol, d);
        setRow(cube.U, topRow, rev(r));
      }
    }

    const TURN_FUNCS = {
      U: turnU,
      D: turnD,
      R: turnR,
      L: turnL,
      F: turnF,
      B: turnB
    };

    function parseMove(token, size) {
      const original = token;
      token = token.trim();
      if (!token) return null;

      let suffix = "";
      if (token.endsWith("2")) {
        suffix = "2";
        token = token.slice(0, -1);
      } else if (token.endsWith("'")) {
        suffix = "'";
        token = token.slice(0, -1);
      }

      let layers = 1;
      let face = "";
      let wide = false;

      const lowerWideMap = {
        u: "U", d: "D", r: "R", l: "L", f: "F", b: "B"
      };

      if (/^[udrlfb]$/.test(token)) {
        face = lowerWideMap[token];
        wide = true;
        layers = 2;
      } else {
        const m = token.match(/^(\d+)?([UDRLFB])(w)?$/);
        if (!m) {
          throw new Error(`Unsupported move: ${original}`);
        }
        const prefix = m[1];
        face = m[2];
        wide = !!m[3];
        if (prefix) {
          layers = parseInt(prefix, 10);
        } else if (wide) {
          layers = 2;
        } else {
          layers = 1;
        }
      }

      if (!wide && layers !== 1) {
        throw new Error(`Invalid move: ${original}`);
      }

      if (layers < 1 || layers > Math.floor(size / 2)) {
        throw new Error(`Invalid layer count for ${size}x${size}: ${original}`);
      }

      let turns = 1;
      if (suffix === "2") turns = 2;
      if (suffix === "'") turns = 3;

      return { face, layers, turns };
    }

    function applyMove(cube, move) {
      const fn = TURN_FUNCS[move.face];
      for (let i = 0; i < move.turns; i++) {
        fn(cube, move.layers);
      }
    }

    function applyScramble(size, scramble) {
      const cube = makeCube(size);
      const tokens = scramble.trim().split(/\s+/).filter(Boolean);

      for (const token of tokens) {
        const move = parseMove(token, size);
        if (move) applyMove(cube, move);
      }

      return cube;
    }

    function renderTopFace(cube) {
      const size = cube.U.length;
      viewerEl.style.gridTemplateColumns = `repeat(${size}, 24px)`;
      viewerEl.style.gridTemplateRows = `repeat(${size}, 24px)`;

      viewerEl.innerHTML = cube.U.flat().map(face =>
        `<div class="sticker" style="background:${FACE_COLORS[face]}"></div>`
      ).join("");
    }

    function applyCurrent() {
      const size = Number(sizeSelect.value);
      const scramble = scrambleInput.value.trim();

      try {
        const cube = applyScramble(size, scramble);
        renderTopFace(cube);
        statusEl.textContent = scramble ? `Applied to ${size}x${size}.` : `Showing solved ${size}x${size} top face.`;
      } catch (err) {
        statusEl.textContent = err.message;
        viewerEl.innerHTML = "";
      }
    }

    function loadExample() {
      const size = Number(sizeSelect.value);
      const examples = {
        2: "R U R' F2 U' R2 F U",
        3: "R U R' U' F2 D L2 B U2",
        4: "Rw U2 F Rw' U' 2Rw2 Fw D2",
        5: "Rw U2 F Rw' U' 2Uw2 Fw D2 L",
        6: "3Rw U2 2Uw' Fw2 R 3Fw D2",
        7: "3Rw U2 3Uw' Fw2 R 2Uw 3Fw D2"
      };
      scrambleInput.value = examples[size];
      applyCurrent();
    }

    document.getElementById("applyBtn").addEventListener("click", applyCurrent);
    document.getElementById("exampleBtn").addEventListener("click", loadExample);
    document.getElementById("clearBtn").addEventListener("click", () => {
      scrambleInput.value = "";
      applyCurrent();
    });
    sizeSelect.addEventListener("change", applyCurrent);

    applyCurrent();
  </script>
</body>
</html>
