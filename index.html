<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WCA Cube Top Face Viewer</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #f5f7fb;
      --muted: #9aa4b2;
      --accent: #4f8cff;
      --border: #2a3140;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, Arial, sans-serif;
      padding: 24px;
    }
    .card {
      width: min(980px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 3vw, 2rem);
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
    }
    .controls {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      align-items: start;
    }
    @media (max-width: 700px) {
      .controls { grid-template-columns: 1fr; }
    }
    select, textarea, button { font: inherit; }
    select, textarea {
      width: 100%;
      background: #0d1016;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.4;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button {
      border: 0;
      background: var(--accent);
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { filter: brightness(1.08); }
    .status {
      margin-top: 14px;
      padding: 14px 16px;
      background: #0d1016;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      min-height: 52px;
      display: flex;
      align-items: center;
    }
    .viewer-wrap {
      margin-top: 18px;
      display: flex;
      gap: 18px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .viewer {
      display: grid;
      gap: 3px;
      padding: 8px;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      width: max-content;
    }
    .sticker {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.2);
    }
    .meta {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 460px;
    }
    code {
      background: #0d1016;
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>WCA Cube Top Face Viewer</h1>
    <p>Paste a scramble for 2x2 through 7x7. Shows the top face after the scramble.</p>

    <div class="controls">
      <select id="sizeSelect">
        <option value="2">2x2</option>
        <option value="3" selected>3x3</option>
        <option value="4">4x4</option>
        <option value="5">5x5</option>
        <option value="6">6x6</option>
        <option value="7">7x7</option>
      </select>

      <textarea id="scrambleInput" placeholder="Paste scramble here...">R U R' U'</textarea>
    </div>

    <div class="row">
      <button id="applyBtn">Apply Scramble</button>
      <button id="exampleBtn">Load Example</button>
      <button id="clearBtn">Clear</button>
    </div>

    <div class="status" id="status">Ready.</div>

    <div class="viewer-wrap">
      <div id="viewer" class="viewer"></div>
      <div class="meta">
        Supported:
        <div><code>U D R L F B</code>, <code>'</code>, <code>2</code></div>
        <div><code>Rw Uw Fw</code>, <code>3Rw 2Uw</code>, lowercase wide aliases like <code>r u f</code></div>
        <div style="margin-top:10px;">Top face only.</div>
      </div>
    </div>
  </main>

  <script>
    const FACE_COLORS = {
      U: "#ffffff",
      D: "#ffd500",
      F: "#00a651",
      B: "#0051ba",
      R: "#c41e3a",
      L: "#ff5800"
    };

    const sizeSelect = document.getElementById("sizeSelect");
    const scrambleInput = document.getElementById("scrambleInput");
    const statusEl = document.getElementById("status");
    const viewerEl = document.getElementById("viewer");

    function makeCube(size) {
      const stickers = [];

      for (let z = 0; z < size; z++) {
        for (let x = 0; x < size; x++) {
          stickers.push({ x, y: size - 1, z, nx: 0, ny: 1, nz: 0, color: "U" });
          stickers.push({ x, y: 0, z: size - 1 - z, nx: 0, ny: -1, nz: 0, color: "D" });
        }
      }

      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          stickers.push({ x, y, z: size - 1, nx: 0, ny: 0, nz: 1, color: "F" });
          stickers.push({ x: size - 1 - x, y, z: 0, nx: 0, ny: 0, nz: -1, color: "B" });
        }
      }

      for (let y = 0; y < size; y++) {
        for (let z = 0; z < size; z++) {
          stickers.push({ x: size - 1, y, z, nx: 1, ny: 0, nz: 0, color: "R" });
          stickers.push({ x: 0, y, z: size - 1 - z, nx: -1, ny: 0, nz: 0, color: "L" });
        }
      }

      return { size, stickers };
    }

    function rotateU(sticker, n) {
      const x = sticker.x, z = sticker.z, nx = sticker.nx, nz = sticker.nz;
      sticker.x = z;
      sticker.z = n - 1 - x;
      sticker.nx = nz;
      sticker.nz = -nx;
    }

    function rotateD(sticker, n) {
      const x = sticker.x, z = sticker.z, nx = sticker.nx, nz = sticker.nz;
      sticker.x = n - 1 - z;
      sticker.z = x;
      sticker.nx = -nz;
      sticker.nz = nx;
    }

    function rotateR(sticker, n) {
      const y = sticker.y, z = sticker.z, ny = sticker.ny, nz = sticker.nz;
      sticker.y = z;
      sticker.z = n - 1 - y;
      sticker.ny = nz;
      sticker.nz = -ny;
    }

    function rotateL(sticker, n) {
      const y = sticker.y, z = sticker.z, ny = sticker.ny, nz = sticker.nz;
      sticker.y = n - 1 - z;
      sticker.z = y;
      sticker.ny = -nz;
      sticker.nz = ny;
    }

    function rotateF(sticker, n) {
      const x = sticker.x, y = sticker.y, nx = sticker.nx, ny = sticker.ny;
      sticker.x = y;
      sticker.y = n - 1 - x;
      sticker.nx = ny;
      sticker.ny = -nx;
    }

    function rotateB(sticker, n) {
      const x = sticker.x, y = sticker.y, nx = sticker.nx, ny = sticker.ny;
      sticker.x = n - 1 - y;
      sticker.y = x;
      sticker.nx = -ny;
      sticker.ny = nx;
    }

    const ROTATE = {
      U: rotateU,
      D: rotateD,
      R: rotateR,
      L: rotateL,
      F: rotateF,
      B: rotateB
    };

    function inLayer(sticker, face, layers, n) {
      if (face === "U") return sticker.y >= n - layers;
      if (face === "D") return sticker.y < layers;
      if (face === "R") return sticker.x >= n - layers;
      if (face === "L") return sticker.x < layers;
      if (face === "F") return sticker.z >= n - layers;
      if (face === "B") return sticker.z < layers;
      return false;
    }

    function applyTurn(cube, face, layers, turns) {
      const rotate = ROTATE[face];
      for (let t = 0; t < turns; t++) {
        for (const sticker of cube.stickers) {
          if (inLayer(sticker, face, layers, cube.size)) {
            rotate(sticker, cube.size);
          }
        }
      }
    }

    function parseMove(token, size) {
      const original = token.trim();
      if (!original) return null;

      let tokenBase = original;
      let suffix = "";

      if (tokenBase.endsWith("2")) {
        suffix = "2";
        tokenBase = tokenBase.slice(0, -1);
      } else if (tokenBase.endsWith("'")) {
        suffix = "'";
        tokenBase = tokenBase.slice(0, -1);
      }

      let face = null;
      let layers = 1;

      const lowerWideMap = { u: "U", d: "D", r: "R", l: "L", f: "F", b: "B" };

      if (/^[udrlfb]$/.test(tokenBase)) {
        face = lowerWideMap[tokenBase];
        layers = 2;
      } else {
        const m = tokenBase.match(/^(\d+)?([UDRLFB])(w)?$/);
        if (!m) throw new Error(`Unsupported move: ${original}`);
        face = m[2];
        if (m[1]) {
          if (!m[3]) throw new Error(`Invalid move: ${original}`);
          layers = parseInt(m[1], 10);
        } else if (m[3]) {
          layers = 2;
        }
      }

      if (layers < 1 || layers > Math.floor(size / 2)) {
        throw new Error(`Invalid layer count for ${size}x${size}: ${original}`);
      }

      let turns = 1;
      if (suffix === "2") turns = 2;
      else if (suffix === "'") turns = 3;

      return { face, layers, turns };
    }

    function applyScramble(size, scramble) {
      const cube = makeCube(size);
      const tokens = scramble.trim().split(/\s+/).filter(Boolean);

      for (const token of tokens) {
        const move = parseMove(token, size);
        if (move) applyTurn(cube, move.face, move.layers, move.turns);
      }

      return cube;
    }

    function renderTopFace(cube) {
      const n = cube.size;
      const top = cube.stickers
        .filter(s => s.nx === 0 && s.ny === 1 && s.nz === 0 && s.y === n - 1)
        .sort((a, b) => (a.z - b.z) || (a.x - b.x));

      viewerEl.style.gridTemplateColumns = `repeat(${n}, 24px)`;
      viewerEl.style.gridTemplateRows = `repeat(${n}, 24px)`;

      viewerEl.innerHTML = top.map(s =>
        `<div class="sticker" style="background:${FACE_COLORS[s.color]}"></div>`
      ).join("");
    }

    function applyCurrent() {
      const size = Number(sizeSelect.value);
      const scramble = scrambleInput.value.trim();

      try {
        const cube = applyScramble(size, scramble);
        renderTopFace(cube);
        statusEl.textContent = scramble ? `Applied to ${size}x${size}.` : `Showing solved ${size}x${size} top face.`;
      } catch (err) {
        viewerEl.innerHTML = "";
        statusEl.textContent = err.message;
      }
    }

    function loadExample() {
      const size = Number(sizeSelect.value);
      const examples = {
        2: "R U R' U'",
        3: "R U R' U'",
        4: "Rw U2 F Rw' U'",
        5: "Rw U2 F Rw' U' 2Uw2",
        6: "3Rw U2 2Uw' Fw2 R",
        7: "3Rw U2 3Uw' Fw2 R 2Uw"
      };
      scrambleInput.value = examples[size];
      applyCurrent();
    }

    document.getElementById("applyBtn").addEventListener("click", applyCurrent);
    document.getElementById("exampleBtn").addEventListener("click", loadExample);
    document.getElementById("clearBtn").addEventListener("click", () => {
      scrambleInput.value = "";
      applyCurrent();
    });
    sizeSelect.addEventListener("change", applyCurrent);

    applyCurrent();
  </script>
</body>
</html>
